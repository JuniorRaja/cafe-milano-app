name: cafe_milano
description: "BakeOrder — Daily bakery order management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.22.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  share_plus: ^10.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.27
  path: ^1.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "mobile-app-logo-trasnsp.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFC000"
  adaptive_icon_foreground: "mobile-app-logo-trasnsp.png"
