name: milano_orders
description: "Milano Orders — Daily bakery order management"
publish_to: 'none'
version: 1.4.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.22.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  share_plus: ^10.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.27
  path: ^1.9.0
  flutter_native_splash: ^2.4.4
  package_info_plus: ^8.1.2
  pdf: ^3.11.1
  printing: ^5.13.4
  file_picker: ^10.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - mobile-app-logo-trasnsp.png
    - bg-vector.png
    - docs/cafe-milano-backup-20260708-224812.json
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "mobile-app-logo-trasnsp.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "mobile-app-logo-trasnsp.png"

flutter_native_splash:
  color: "#FFFBF5"
  android_12:
    color: "#FFFBF5"
